version: '3'

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d  # Монтируем миграции
    networks:
      - app-network
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - postgres
    networks:
      - app-network
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - DB_HOST=postgres

networks:
  app-network:

volumes:
  postgres_data: